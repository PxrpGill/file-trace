upstream backend_keepalive {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80;
    client_max_body_size 2g;

    location /api/ {
        proxy_pass http://backend_keepalive;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
        # Office-document preview conversion runs synchronously and can take
        # tens of seconds — must stay above preview.CONVERSION_TIMEOUT_SECONDS
        # so our own timeout response reaches the client, not an nginx 504.
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
