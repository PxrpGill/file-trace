services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: filetrace
      POSTGRES_USER: filetrace
      POSTGRES_PASSWORD: filetrace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filetrace"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
